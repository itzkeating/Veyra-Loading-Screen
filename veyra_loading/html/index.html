<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Loading</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Bebas+Neue&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:    #07090f;
  --s1:    #0c101a;
  --s2:    #131825;
  --s3:    #1a2030;
  --ac:    #6b9fff;
  --ac2:   #a78bfa;
  --text:  #c8cdd8;
  --dim:   #4a5168;
  --glass: rgba(12,16,26,0.75);
  --bdr:   rgba(255,255,255,0.07);
  --bdr-h: rgba(107,159,255,0.28);
}
html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:transparent;
  cursor:pointer;
  font-family:'Inter',sans-serif;
  -webkit-font-smoothing:antialiased
}
#vbg{
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
  transition:opacity 1.2s ease;
}
#vbg video{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:1;
}
#ov{
  position:fixed;
  inset:0;
  z-index:1;
  background:linear-gradient(
    175deg,
    rgba(7,9,15,.18) 0%,
    rgba(7,9,15,.05) 52%,
    rgba(7,9,15,.22) 100%
  );
  transition:opacity 1.2s ease;
}
#ov::after{
  content:'';
  position:absolute;
  inset:0;
  background:radial-gradient(
    ellipse at 50% 50%,
    rgba(7,9,15,0.02) 0%,
    rgba(7,9,15,0.08) 55%,
    rgba(7,9,15,0.18) 100%
  );
}
#ui{
  transition:opacity 1.2s ease;
  position:fixed;inset:0;z-index:5;display:flex;flex-direction:column;justify-content:space-between;padding:34px 46px
}
#top{display:flex;align-items:flex-start;justify-content:space-between;gap:28px}
.brand-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(26px,3vw,42px);letter-spacing:.07em;color:#fff;line-height:1}
.brand-name em{color:var(--ac);font-style:normal}
.brand-tag{margin-top:6px;font-size:10px;font-weight:500;letter-spacing:.22em;color:var(--dim);text-transform:uppercase}
#music{
  background:var(--glass);border:1px solid var(--bdr);
  border-radius:10px;padding:14px 16px 13px;
  backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  width:268px;display:flex;flex-direction:column;gap:12px;
}
.np-eyebrow{font-size:9px;font-weight:600;letter-spacing:.3em;color:var(--dim);text-transform:uppercase}
.np-row{display:flex;align-items:center;gap:11px}
.np-art{
  width:38px;height:38px;flex-shrink:0;border-radius:7px;
  background:var(--s2);border:1px solid var(--bdr);
  display:flex;align-items:flex-end;justify-content:center;
  gap:2px;padding-bottom:6px;overflow:hidden;
}
.np-art .b{width:4px;border-radius:2px 2px 0 0;background:var(--ac);opacity:.75;
}
.np-art.playing .b{
  animation:eq .75s ease-in-out infinite alternate;
}
.np-art .b:nth-child(1){height:9px; animation-delay:0s}
.np-art .b:nth-child(2){height:17px;animation-delay:.13s}
.np-art .b:nth-child(3){height:12px;animation-delay:.26s}
.np-art .b:nth-child(4){height:19px;animation-delay:.07s}
@keyframes eq{from{transform:scaleY(.28)}to{transform:scaleY(1)}}
.np-meta{min-width:0;flex:1}
.np-title{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.np-artist{font-size:11px;color:var(--dim);margin-top:2px}
.vol-row{display:flex;align-items:center;gap:8px}
.play-btn{
  width:24px;height:24px;border-radius:50%;
  background:rgba(107,159,255,.12);border:1px solid rgba(107,159,255,.2);
  display:flex;align-items:center;justify-content:center;
  color:var(--ac);font-size:10px;cursor:pointer;user-select:none;flex-shrink:0;
  transition:background .18s,border-color .18s;
}
.play-btn:hover{background:rgba(107,159,255,.22);border-color:rgba(107,159,255,.4)}
#vol{
  -webkit-appearance:none;appearance:none;
  flex:1;height:2px;border-radius:1px;outline:none;cursor:pointer;
  background:rgba(255,255,255,.1);
}
#vol::-webkit-slider-thumb{
  -webkit-appearance:none;width:11px;height:11px;border-radius:50%;
  background:var(--ac);cursor:pointer;
}
#track-dots{display:flex;gap:7px;align-items:center}
.tdot{
  width:24px;height:24px;border-radius:50%;
  border:1px solid var(--bdr);
  background:rgba(255,255,255,.04);
  display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;
  color:var(--dim);cursor:pointer;user-select:none;flex-shrink:0;
  transition:color .15s,border-color .15s,background .15s;
}
.tdot:hover{color:var(--text);border-color:rgba(255,255,255,.2)}
.tdot.on{color:var(--ac);border-color:rgba(107,159,255,.45);background:rgba(107,159,255,.1)}
#mid{display:flex;align-items:flex-end;justify-content:space-between;flex:1;margin:18px 0}
#tip-box{
  max-width:390px;align-self:flex-end;
  background:var(--glass);border:1px solid var(--bdr);
  border-radius:10px;padding:16px 20px;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}
.tip-label{font-size:9px;font-weight:600;letter-spacing:.28em;color:var(--ac);text-transform:uppercase;margin-bottom:8px;opacity:.8}
#tip{font-size:14px;font-weight:400;color:var(--text);line-height:1.72;min-height:44px;transition:opacity .32s}
#links{display:flex;flex-direction:column;align-items:flex-end;gap:7px;align-self:flex-end}
.lnk{
  display:flex;align-items:center;gap:10px;
  text-decoration:none;
  background:var(--glass);border:1px solid var(--bdr);
  border-radius:8px;padding:10px 15px;min-width:205px;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  transition:border-color .2s,background .2s,transform .17s;cursor:pointer;
}
.lnk:hover{border-color:var(--bdr-h);background:rgba(12,16,26,.9);transform:translateX(-4px)}
.lnk:hover .lnk-label{color:#fff}
.lnk:hover .lnk-arrow{color:var(--ac);transform:translateX(3px)}
.lnk-ic{
  width:27px;height:27px;border-radius:5px;
  border:1px solid var(--bdr);background:rgba(255,255,255,.04);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:12px;
  transition:border-color .2s,background .2s;
}
.lnk:hover .lnk-ic{border-color:rgba(107,159,255,.3);background:rgba(107,159,255,.09)}
.lnk-body{flex:1;min-width:0}
.lnk-label{font-size:13px;font-weight:500;color:var(--text);transition:color .2s}
.lnk-sub{font-size:10px;color:var(--dim);margin-top:1px;font-family:'JetBrains Mono',monospace;letter-spacing:.03em}
.lnk-arrow{font-size:15px;color:var(--dim);transition:color .2s,transform .2s;line-height:1}
#bot{display:flex;flex-direction:column;gap:9px}
#prog-row{display:flex;align-items:center;gap:16px}
.stage{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;
  letter-spacing:.2em;color:var(--ac);white-space:nowrap;min-width:112px;text-transform:uppercase}
#ptrack{flex:1;height:2px;background:rgba(255,255,255,.07);border-radius:1px;position:relative;overflow:visible}
#pfill{height:100%;width:0%;border-radius:1px;transition:width .28s ease;position:relative;
  background:linear-gradient(90deg,var(--ac2),var(--ac))}
#pfill::after{content:'';position:absolute;right:-3px;top:50%;transform:translateY(-50%);
  width:5px;height:5px;border-radius:50%;background:var(--ac)}
#ppct{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;color:var(--text);min-width:36px;text-align:right}
#stat-row{display:flex;justify-content:space-between;align-items:center}
#stat-msg{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);letter-spacing:.04em}
.cur{display:inline-block;animation:blink 1.1s step-end infinite;color:var(--ac)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.chips{display:flex;gap:18px}
.chip{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--dim);letter-spacing:.1em}
.chip b{color:rgba(200,205,216,.5);font-weight:400}
@keyframes up{from{opacity:0;transform:translateY(13px)}to{opacity:1;transform:translateY(0)}}
.ai{animation:up .6s cubic-bezier(.22,1,.36,1) both}
#top{animation-delay:.04s}#mid{animation-delay:.16s}#bot{animation-delay:.28s}
</style>
</head>
<body>

<div id="vbg">
  <video id="bgvid" autoplay muted loop playsinline preload="auto" src="https://files.catbox.moe/klgxda.mp4"></video>
</div>
<div id="ov"></div>
<audio id="aud" preload="auto"></audio>

<div id="ui">
  <div id="top" class="ai">
    <div class="brand">
      <div class="brand-name" id="bname"></div>
      <div class="brand-tag" id="btag"></div>
    </div>
    <div id="music">
      <div class="np-eyebrow">Now playing</div>
      <div class="np-row">
        <div class="np-art">
          <div class="b"></div><div class="b"></div>
          <div class="b"></div><div class="b"></div>
        </div>
        <div class="np-meta">
          <div class="np-title" id="np-title">—</div>
          <div class="np-artist" id="np-artist">—</div>
        </div>
      </div>
      <div class="vol-row">
        <div class="play-btn" id="pbtn">▶</div>
        <input type="range" id="vol" min="0" max="100" value="55"/>
      </div>
      <div id="track-dots"></div>
    </div>
  </div>
  <div id="mid" class="ai">
    <div id="tip-box">
      <div class="tip-label">server tip</div>
      <div id="tip">—</div>
    </div>
    <div id="links"></div>
  </div>
  <div id="bot" class="ai">
    <div id="prog-row">
      <div class="stage" id="stage">Connecting</div>
      <div id="ptrack"><div id="pfill"></div></div>
      <div id="ppct">0%</div>
    </div>
    <div id="stat-row">
      <div id="stat-msg"><span id="smsg">Initializing</span><span class="cur">_</span></div>
      <div class="chips">
        <div class="chip">build <b>b3095</b></div>
        <div class="chip">map <b>Los Santos</b></div>
        <div class="chip">mode <b>Roleplay</b></div>
      </div>
    </div>
  </div>
</div>
<script>
const C = (typeof Config !== 'undefined') ? Config : {
  ServerName: "Veyra",
  ServerNameHL: "Studios",
  ServerTagline: "",
  Buttons: [
    // (add more if needed to just an example idk if you all would like this)
   // { icon:"💬", label:"Discord", sub:"Our Discord", url:"https://discord.gg/veyra" },
  ],
  Tracks: [
    { file:"track1.mp3", title:"Arcade", artist:"Duncan Laurence" },
    { file:"track2.mp3", title:"Dancing in the sky", artist:"Sam Barber" },
    { file:"track3.mp3", title:"Angels", artist:"Mazza L20" },
  ],
  Tips: [
    "Use /report to flag rule violations to staff.",
    "Keep your mic clear good audio makes RP better for everyone.",
    "Lost your vehicle? Check the impound on your map.",
    "New here? Read the rules on our website before jumping in.",
    "Join the Discord to stay up to date with events and updates.",
    "Vehicle damage is persistent find a mechanic to repair.",
    "Need help? Open a support ticket in our Discord.",
  ],
};

const MP = "./assets/music/";
const aud  = document.getElementById('aud');
const vol  = document.getElementById('vol');
const pbtn = document.getElementById('pbtn');
const dots = document.getElementById('track-dots');

document.getElementById('bname').innerHTML = C.ServerName + ' <em>' + C.ServerNameHL + '</em>';
document.getElementById('btag').textContent = C.ServerTagline || '';

const linksEl = document.getElementById('links');
C.Buttons.forEach(b => {
  const a = document.createElement('a');
  a.className = 'lnk';
  a.href = b.url;
  a.target = '_blank';
  a.innerHTML =
    `<div class="lnk-ic">${b.icon}</div>` +
    `<div class="lnk-body"><div class="lnk-label">${b.label}</div><div class="lnk-sub">${b.sub}</div></div>` +
    `<div class="lnk-arrow">›</div>`;
  linksEl.appendChild(a);
});

let curT = 0;

C.Tracks.forEach((t, i) => {
  const d = document.createElement('div');
  d.className = 'tdot' + (i === 0 ? ' on' : '');
  d.textContent = i + 1;
  d.title = t.title + ' — ' + t.artist;
  d.addEventListener('click', () => playTrack(i));
  dots.appendChild(d);
});

function playTrack(i) {
  curT = i % C.Tracks.length;
  const t = C.Tracks[curT];

  aud.src = MP + t.file;
  aud.volume = vol.value / 100;
  aud.play().catch(() => {});

  document.getElementById('np-title').textContent = t.title;
  document.getElementById('np-artist').textContent = t.artist;

  dots.querySelectorAll('.tdot').forEach((d, j) => d.classList.toggle('on', j === curT));
  document.querySelector('.np-art').classList.add('playing');
  pbtn.textContent = '❚❚';
}

aud.addEventListener('ended', () => playTrack(curT + 1));
playTrack(0);

vol.addEventListener('input', () => {
  aud.volume = vol.value / 100;
});

pbtn.addEventListener('click', () => {
  if (aud.paused) {
    aud.play().catch(() => {});
    pbtn.textContent = '❚❚';
    document.querySelector('.np-art').classList.add('playing');
  } else {
    aud.pause();
    pbtn.textContent = '▶';
    document.querySelector('.np-art').classList.remove('playing');
  }
});

const tipEl = document.getElementById('tip');
let ti = 0;
function nextTip() {
  tipEl.style.opacity = '0';
  setTimeout(() => {
    tipEl.textContent = C.Tips[ti++ % C.Tips.length];
    tipEl.style.opacity = '1';
  }, 340);
}
nextTip();
setInterval(nextTip, 7000);

const pfill = document.getElementById('pfill');
const ppct  = document.getElementById('ppct');
const smsg  = document.getElementById('smsg');
const stEl  = document.getElementById('stage');

const STAGES = [
  [0, 10, "Connecting", "Establishing connection"],
  [10, 30, "Auth", "Verifying identity"],
  [30, 55, "Map", "Streaming world data"],
  [55, 75, "Resources", "Downloading resources"],
  [75, 90, "Spawning", "Loading character"],
  [90, 100, "Almost ready", "Syncing world state"],
];

let hasFinished = false;

function finishLoading() {
  if (hasFinished) return;
  hasFinished = true;

  const ui = document.getElementById('ui');
  const ov = document.getElementById('ov');
  const bg = document.getElementById('vbg');

  try {
    aud.pause();
    aud.currentTime = 0;
    aud.src = "";
  } catch(e) {}

  ui.style.opacity = '0';
  ov.style.opacity = '0';
  bg.style.opacity = '0';
  document.body.style.display = 'none';
}

function setP(p) {
  p = Math.max(0, Math.min(100, p));
  pfill.style.width = p + '%';
  ppct.textContent = Math.round(p) + '%';

  for (const [s,e,st,ms] of STAGES) {
    if (p >= s && p <= e) {
      stEl.textContent = st;
      smsg.textContent = ms;
      break;
    }
  }
}

window.addEventListener('message', function(ev) {
  const d = ev.data;
  if (!d) return;

  if (d.eventName === 'loadProgress' && d.loadFraction != null) {
    setP(d.loadFraction * 100);
  }

  if (d.eventName === 'spawnEnabled') {
    setP(100);
    finishLoading();
  }
});

window.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    if (aud.paused) {
      aud.play().catch(() => {});
      pbtn.textContent = '❚❚';
      document.querySelector('.np-art').classList.add('playing');
    } else {
      aud.pause();
      pbtn.textContent = '▶';
      document.querySelector('.np-art').classList.remove('playing');
    }
  } else if (e.code === 'ArrowRight') {
    playTrack(curT + 1);
  } else if (e.code === 'ArrowLeft') {
    playTrack(curT - 1);
  }
});

setP(0);
</script>
</body>
</html>
